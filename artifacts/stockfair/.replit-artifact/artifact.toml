kind = "mobile"
previewPath = "/"
title = "StockFair"
version = "1.0.0"
id = "artifacts/stockfair"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25279

[services.development]
run = "pnpm --filter @workspace/stockfair run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stockfair", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/stockfair", "run", "serve" ]

[services.env]
PORT = "25279"
BASE_PATH = "/"
